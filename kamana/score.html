<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMind Result</title>
    <link rel="stylesheet" href="score.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo-box">
                <img src="MatchMind_Logo.png" alt="MatchMind Logo">
                <h1>MatchMind</h1>
            </div>
        </header>
        <section class="result">
            <div class="circle">5/5</div>

            <div class="result-text">
                <h2>Perfect Score! 🎉</h2>
                <p>Great job — you got all answers correct.</p>
            </div>
        </section>
        <section class="stats">
            <div class="card">
                <h3>5</h3>
                <p>Correct</p>
            </div>
            <div class="card">
                <h3>0</h3>
                <p>Wrong</p>
            </div>
            <div class="card">
                <h3>0</h3>
                <p>Skipped</p>
            </div>
          </section>
        <div class="button-container">
            <button class="start-btn" onclick="window.location.href='index.html'">
                Try Again
            </button>
        </div>
    </div>
</body>
</html>

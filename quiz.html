<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="container">
  <div class="card">
    <H2>MatchMind</H2>
   
    <div class="box">
       <div class="logo">
      
      <img src="MatchMind_Logo.png">
    

    </div>
      <div class="mix"><div class="timer"></div>
      <div class="question">
        <h4></h4>
      <h3></h3>
      </div></div>
      <div class="options">
         <button class="option">
           <div class="letter">A</div>
           <div class="text"></div>
         </button>
          <button class="option">
             <div class="letter">B</div>
             <div class="text"></div>
          </button>
           <button class="option">
             <div class="letter">C</div>
             <div class="text"></div>
           </button>
            <button class="option">
               <div class="letter">D</div>
               <div class="text"></div>
            </button>
            </div>
    </div>
 <button class="skip" onclick="skipQuestion()">Skip >></button>

<button class="next" onclick="nextQuestion()">Next</button>
  </div>
</div>
<script src="quiz.js"></script>
</body>
</html>
